services:
  merchant-db:
    image: mysql:8.0
    container_name: merchant-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: pg_merchant_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - merchant-db-data:/var/lib/mysql
    networks:
      - erumpay-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  merchant-service:
    build: .
    container_name: merchant-service
    ports:
      - "8094:8094"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      merchant-db:
        condition: service_healthy
    networks:
      - erumpay-network

volumes:
  merchant-db-data:

networks:
  erumpay-network:
    name: erumpay-network
