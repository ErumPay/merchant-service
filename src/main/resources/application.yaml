server:
  port: 8094

spring:
  application:
    name: merchant-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/pg_merchant_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true